<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Three.js - Custom Shader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px;
    }
    #panel {
      position: fixed; top: 60px; right: 16px;
      background: rgba(0,0,0,0.75); color: #fff; font-size: 12px;
      padding: 12px 16px; border-radius: 6px; min-width: 220px; line-height: 2;
    }
    #panel input[type=range] { width: 130px; vertical-align: middle; }
    select { background: #223; color: #fff; border: 1px solid #446; padding: 2px 6px; }
  </style>
</head>
<body>
  <div id="info">Three.js ShaderMaterial — 自定义 GLSL 着色器</div>
  <div id="panel">
    <b>Shader Controls</b><br>
    Preset:
    <select id="preset">
      <option value="wave">Wave Displacement</option>
      <option value="plasma">Plasma</option>
      <option value="fresnel">Fresnel / Rim Light</option>
      <option value="hologram">Hologram</option>
    </select><br>
    Speed:    <input type="range" id="speed"    min="0.1" max="5" step="0.1" value="1"><br>
    Amplitude:<input type="range" id="amplitude" min="0"  max="1" step="0.01" value="0.3"><br>
    Color Hue:<input type="range" id="hue"       min="0"  max="1" step="0.01" value="0.6">
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030308);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 0, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // ── GLSL Shaders ──────────────────────────────────────────────────────
    const shaders = {
      wave: {
        vert: `
          uniform float u_time;
          uniform float u_amplitude;
          varying vec2 vUv;
          varying vec3 vNormal;
          void main() {
            vUv = uv;
            vNormal = normalMatrix * normal;
            vec3 pos = position;
            float wave = sin(pos.x * 4.0 + u_time * 3.0) * cos(pos.y * 4.0 + u_time * 2.5);
            pos += normal * wave * u_amplitude;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          }
        `,
        frag: `
          uniform float u_time;
          uniform float u_hue;
          varying vec2 vUv;
          varying vec3 vNormal;
          vec3 hsl2rgb(float h, float s, float l) {
            vec3 c = clamp(abs(mod(h*6.0+vec3(0,4,2),6.0)-3.0)-1.0, 0.0, 1.0);
            return l + s*(c-0.5)*(1.0-abs(2.0*l-1.0));
          }
          void main() {
            float light = dot(normalize(vNormal), normalize(vec3(1,1,1))) * 0.5 + 0.5;
            float h = u_hue + vUv.x * 0.2 + u_time * 0.05;
            vec3 col = hsl2rgb(h, 0.8, 0.3 + light * 0.4);
            gl_FragColor = vec4(col, 1.0);
          }
        `,
      },
      plasma: {
        vert: `
          varying vec2 vUv;
          varying vec3 vPos;
          void main() {
            vUv = uv;
            vPos = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        frag: `
          uniform float u_time;
          uniform float u_amplitude;
          uniform float u_hue;
          varying vec2 vUv;
          varying vec3 vPos;
          void main() {
            float v = 0.0;
            v += sin(vUv.x * 10.0 + u_time * 2.0);
            v += sin(vUv.y * 10.0 + u_time * 1.5);
            v += sin((vUv.x + vUv.y) * 8.0 + u_time);
            v += sin(length(vUv - 0.5) * 20.0 - u_time * 3.0);
            v = v * 0.25 + 0.5;
            float r = 0.5 + 0.5 * sin(v * 6.28 + u_hue * 6.28);
            float g = 0.5 + 0.5 * sin(v * 6.28 + u_hue * 6.28 + 2.09);
            float b = 0.5 + 0.5 * sin(v * 6.28 + u_hue * 6.28 + 4.18);
            gl_FragColor = vec4(r, g, b, 1.0);
          }
        `,
      },
      fresnel: {
        vert: `
          varying vec3 vNormal;
          varying vec3 vViewDir;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
            vViewDir = normalize(-mvPos.xyz);
            gl_Position = projectionMatrix * mvPos;
          }
        `,
        frag: `
          uniform float u_time;
          uniform float u_hue;
          varying vec3 vNormal;
          varying vec3 vViewDir;
          vec3 hsl2rgb(float h, float s, float l) {
            vec3 c = clamp(abs(mod(h*6.0+vec3(0,4,2),6.0)-3.0)-1.0, 0.0, 1.0);
            return l + s*(c-0.5)*(1.0-abs(2.0*l-1.0));
          }
          void main() {
            float fresnel = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 3.0);
            vec3 rimColor = hsl2rgb(u_hue + u_time * 0.1, 1.0, 0.6);
            vec3 baseColor = hsl2rgb(u_hue + 0.5, 0.5, 0.1);
            gl_FragColor = vec4(mix(baseColor, rimColor, fresnel), 1.0);
          }
        `,
      },
      hologram: {
        vert: `
          varying vec2 vUv;
          varying vec3 vPos;
          varying vec3 vNormal;
          varying vec3 vViewDir;
          void main() {
            vUv = uv;
            vPos = position;
            vNormal = normalize(normalMatrix * normal);
            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
            vViewDir = normalize(-mvPos.xyz);
            gl_Position = projectionMatrix * mvPos;
          }
        `,
        frag: `
          uniform float u_time;
          uniform float u_hue;
          varying vec2 vUv;
          varying vec3 vPos;
          varying vec3 vNormal;
          varying vec3 vViewDir;
          void main() {
            float scanline = step(0.5, fract(vUv.y * 60.0 + u_time * 5.0));
            float fresnel = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 2.0);
            float flicker = 0.9 + 0.1 * sin(u_time * 30.0);
            vec3 col = vec3(0.1, 0.8, 1.0) * (scanline * 0.3 + fresnel * 0.7) * flicker;
            col += vec3(0.05, 0.3, 0.4) * 0.5;
            float alpha = (scanline * 0.3 + fresnel * 0.5 + 0.2) * flicker;
            gl_FragColor = vec4(col, alpha);
          }
        `,
      },
    };

    const uniforms = {
      u_time:      { value: 0 },
      u_amplitude: { value: 0.3 },
      u_hue:       { value: 0.6 },
    };

    let currentPreset = 'wave';
    let mesh;

    function buildMesh() {
      if (mesh) { scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); }
      const s = shaders[currentPreset];
      const mat = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: s.vert,
        fragmentShader: s.frag,
        side: THREE.DoubleSide,
        transparent: currentPreset === 'hologram',
        depthWrite: currentPreset !== 'hologram',
      });
      mesh = new THREE.Mesh(new THREE.SphereGeometry(1.5, 128, 128), mat);
      scene.add(mesh);
    }
    buildMesh();

    document.getElementById('preset').onchange = (e) => {
      currentPreset = e.target.value; buildMesh();
    };
    document.getElementById('speed').oninput = (e) => uniforms.u_time.speedScale = parseFloat(e.target.value);
    document.getElementById('amplitude').oninput = (e) => uniforms.u_amplitude.value = parseFloat(e.target.value);
    document.getElementById('hue').oninput = (e) => uniforms.u_hue.value = parseFloat(e.target.value);

    uniforms.u_time.speedScale = 1;

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      uniforms.u_time.value += clock.getDelta() * (uniforms.u_time.speedScale || 1);
      mesh.rotation.y += 0.003;
      controls.update();
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
