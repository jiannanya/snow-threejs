<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three.js — Level of Detail (LOD)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a16; overflow: hidden; font-family: monospace; }
#info { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  color: #ccc; font-size: 13px; background: rgba(0,0,0,.65); padding: 6px 16px; border-radius: 6px; white-space: nowrap; }
#hud { position: absolute; top: 50px; left: 16px; color: #88aacc; font-size: 12px; line-height: 1.8; }
#controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; align-items: center; }
button { background: rgba(255,255,255,.1); color: #fff; border: 1px solid #555;
  padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
button.active { background: rgba(80,200,255,.3); border-color: #50c8ff; }
label { color: #aaa; font-size: 12px; }
</style>
</head>
<body>
<div id="info">Three.js LOD — Level of Detail: High/Medium/Low mesh by camera distance</div>
<div id="hud">
  Scroll to zoom and watch LOD change<br>
  <span id="lodStatus">Current LOD: —</span>
</div>
<div id="controls">
  <button id="btnWire">Show Wireframe</button>
  <button id="btnAuto" class="active">Auto Orbit</button>
</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a16);
scene.fog = new THREE.Fog(0x0a0a16, 40, 120);
const camera   = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 0, 15);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 2;
controls.maxDistance = 80;

scene.add(new THREE.AmbientLight(0x334466, 1));
const dLight = new THREE.DirectionalLight(0xffffff, 2);
dLight.position.set(5, 10, 8);
scene.add(dLight);
scene.add(new THREE.GridHelper(100, 50, 0x222244, 0x111133));

// Color mapping for LOD levels
const lodColors = [0x44ff88, 0xffcc44, 0xff4444]; // high, medium, low
const lodLabels = ['High (close)', 'Medium', 'Low (far)'];
const lodDist   = [0, 8, 25]; // switch distances

// LOD specifications: [segments, color]
const lodSpecs = [
  [64,  lodColors[0]], // HIGH
  [16,  lodColors[1]], // MEDIUM
  [4,   lodColors[2]], // LOW
];

// Build a grid of LOD objects
const lods = [];
const GRID = 3;
for (let gx = -GRID; gx <= GRID; gx++) {
  for (let gz = -GRID; gz <= GRID; gz++) {
    const lod = new THREE.LOD();
    lodSpecs.forEach(([seg, color], i) => {
      const geo = new THREE.SphereGeometry(1, seg, seg);
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4 });
      const mesh = new THREE.Mesh(geo, mat);
      lod.addLevel(mesh, lodDist[i]);
    });
    lod.position.set(gx * 5, 1, gz * 5);
    scene.add(lod);
    lods.push(lod);
  }
}

// Legend boxes
const legendItems = lodLabels.map((label, i) => {
  const div = document.createElement('div');
  div.style.cssText = `position:absolute;bottom:${60 + i*22}px;right:16px;color:#aaa;font-size:11px;font-family:monospace;display:flex;align-items:center;gap:6px;`;
  const box = document.createElement('div');
  box.style.cssText = `width:12px;height:12px;border-radius:2px;background:#${lodColors[i].toString(16).padStart(6,'0')}`;
  div.appendChild(box);
  div.appendChild(document.createTextNode(label));
  document.body.appendChild(div);
  return div;
});

let wireframe = false;
let autoOrbit = true;

document.getElementById('btnWire').addEventListener('click', e => {
  wireframe = !wireframe;
  lods.forEach(lod => lod.children.forEach(m => { if (m.material) m.material.wireframe = wireframe; }));
  e.currentTarget.classList.toggle('active', wireframe);
});
document.getElementById('btnAuto').addEventListener('click', e => {
  autoOrbit = !autoOrbit;
  e.currentTarget.classList.toggle('active', autoOrbit);
});

const lodStatus = document.getElementById('lodStatus');

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();
  if (autoOrbit) {
    camera.position.x = Math.sin(t * 0.2) * 20;
    camera.position.z = Math.cos(t * 0.2) * 20;
    camera.position.y = 5 + Math.sin(t * 0.1) * 4;
    camera.lookAt(0, 0, 0);
  }
  lods.forEach(lod => lod.update(camera));

  // Report closest LOD
  const dist = camera.position.length();
  const lvl = dist < lodDist[1] ? 0 : dist < lodDist[2] ? 1 : 2;
  lodStatus.textContent = `Distance: ${dist.toFixed(1)} → ${lodLabels[lvl]}`;

  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
