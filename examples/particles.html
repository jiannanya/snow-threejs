<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Three.js - Particle System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px;
    }
    #panel {
      position: fixed; top: 60px; right: 16px;
      background: rgba(0,0,0,0.7); color: #fff; font-size: 12px;
      padding: 12px 16px; border-radius: 6px; min-width: 200px; line-height: 2;
    }
  </style>
</head>
<body>
  <div id="info">Three.js Particles — Particle System | Drag to Rotate</div>
  <div id="panel">
    Count: <span id="countVal">50000</span><br>
    Size: <input type="range" id="size" min="0.01" max="0.3" step="0.01" value="0.05"><br>
    Speed: <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1"><br>
    <label><input type="checkbox" id="colorful" checked> Colorful</label><br>
    Mode:
    <select id="mode">
      <option value="sphere">Sphere</option>
      <option value="galaxy">Galaxy</option>
      <option value="wave">Wave</option>
      <option value="cube">Cube</option>
    </select>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const COUNT = 50000;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000008);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
    camera.position.set(0, 10, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // ── Particle Texture ──────────────────────────────────────────────────
    function makeSprite() {
      const c = document.createElement('canvas');
      c.width = c.height = 64;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.4, 'rgba(255,255,255,0.6)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 64, 64);
      return new THREE.CanvasTexture(c);
    }
    const sprite = makeSprite();

    // ── Geometry ──────────────────────────────────────────────────────────
    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);
    const phases = new Float32Array(COUNT);

    function fillPositions(mode) {
      for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        if (mode === 'sphere') {
          const phi = Math.acos(2 * Math.random() - 1);
          const theta = Math.random() * Math.PI * 2;
          const r = Math.random() * 12 + 3;
          positions[i3]   = r * Math.sin(phi) * Math.cos(theta);
          positions[i3+1] = r * Math.sin(phi) * Math.sin(theta);
          positions[i3+2] = r * Math.cos(phi);
        } else if (mode === 'galaxy') {
          const arm = Math.floor(Math.random() * 3);
          const r = Math.random() * 15 + 1;
          const angle = arm * (Math.PI * 2 / 3) + r * 0.3 + (Math.random() - 0.5) * 0.5;
          const spread = (1 - r / 15) * 0.5;
          positions[i3]   = Math.cos(angle) * r + (Math.random() - 0.5) * spread;
          positions[i3+1] = (Math.random() - 0.5) * spread * 2;
          positions[i3+2] = Math.sin(angle) * r + (Math.random() - 0.5) * spread;
        } else if (mode === 'wave') {
          positions[i3]   = (Math.random() - 0.5) * 30;
          positions[i3+1] = 0;
          positions[i3+2] = (Math.random() - 0.5) * 30;
        } else { // cube
          positions[i3]   = (Math.random() - 0.5) * 20;
          positions[i3+1] = (Math.random() - 0.5) * 20;
          positions[i3+2] = (Math.random() - 0.5) * 20;
        }
        phases[i] = Math.random() * Math.PI * 2;
      }
    }

    for (let i = 0; i < COUNT; i++) {
      const i3 = i * 3;
      const h = i / COUNT;
      const c = new THREE.Color().setHSL(h, 0.9, 0.6);
      colors[i3] = c.r; colors[i3+1] = c.g; colors[i3+2] = c.b;
    }

    const geo = new THREE.BufferGeometry();
    fillPositions('sphere');
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({
      size: 0.05,
      map: sprite,
      vertexColors: true,
      transparent: true,
      alphaTest: 0.001,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // ── Controls ──────────────────────────────────────────────────────────
    let speed = 1, mode = 'sphere', colorful = true;
    document.getElementById('size').oninput = e => mat.size = parseFloat(e.target.value);
    document.getElementById('speed').oninput = e => speed = parseFloat(e.target.value);
    document.getElementById('colorful').onchange = e => {
      colorful = e.target.checked;
      mat.vertexColors = colorful;
      mat.color.set(colorful ? 0xffffff : 0x88aaff);
      mat.needsUpdate = true;
    };
    document.getElementById('mode').onchange = e => {
      mode = e.target.value;
      fillPositions(mode);
      geo.attributes.position.needsUpdate = true;
    };

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const t = clock.getElapsedTime() * speed;
      if (mode === 'wave') {
        const pos = geo.attributes.position;
        for (let i = 0; i < COUNT; i++) {
          const x = positions[i * 3];
          const z = positions[i * 3 + 2];
          pos.setY(i, Math.sin(x * 0.3 + t) * Math.cos(z * 0.3 + t) * 2);
        }
        pos.needsUpdate = true;
      }
      points.rotation.y = t * 0.05;
      controls.update();
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
