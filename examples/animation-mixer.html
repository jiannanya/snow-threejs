<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Three.js - Animation Mixer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px;
    }
    #panel {
      position: fixed; top: 60px; right: 16px;
      background: rgba(0,0,0,0.75); color: #fff; font-size: 12px;
      padding: 12px 16px; border-radius: 6px; min-width: 220px; line-height: 2;
    }
    #panel button {
      background: #335; color: #adf; border: 1px solid #446;
      padding: 3px 10px; border-radius: 3px; cursor: pointer; margin: 2px;
    }
    #panel button:hover { background: #446; }
    #panel input[type=range] { width: 130px; vertical-align: middle; }
    #timeline {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff; font-size: 12px;
      padding: 8px 16px; border-radius: 4px; text-align: center;
    }
  </style>
</head>
<body>
  <div id="info">Three.js AnimationMixer — Keyframe Animation System | Drag to Rotate</div>
  <div id="panel">
    <b>Animations</b><br>
    <button id="btnPlay">▶ Play</button>
    <button id="btnPause">⏸ Pause</button>
    <button id="btnStop">⏹ Stop</button><br>
    <div>Time Scale: <input type="range" id="timeScale" min="0.1" max="3" step="0.05" value="1"></div>
    <div>Weight: <input type="range" id="weight" min="0" max="1" step="0.05" value="1"></div>
    Loop:
    <select id="loop">
      <option value="once">Once</option>
      <option value="repeat" selected>Repeat</option>
      <option value="pingpong">PingPong</option>
    </select>
  </div>
  <div id="timeline">Time: 0.00s / 3.00s</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a20);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(6, 6, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    scene.add(new THREE.AmbientLight(0x334466, 1.2));
    const dir = new THREE.DirectionalLight(0xffffff, 2.5);
    dir.position.set(8, 12, 6); dir.castShadow = true;
    scene.add(dir);

    // Ground
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0x112233, roughness: 0.9 }));
    floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
    scene.add(floor);
    scene.add(new THREE.GridHelper(20, 20, 0x223344, 0x1a2233));

    // ── Animated Objects ──────────────────────────────────────────────────
    // Object 1: Box (position + rotation + color)
    const box = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 1.5, 1.5),
      new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.4, metalness: 0.3 })
    );
    box.castShadow = true;
    box.position.set(-3, 0.75, 0);
    scene.add(box);

    // Object 2: Sphere (scale bounce)
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.8, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0xff6644, roughness: 0.3, metalness: 0.5 })
    );
    sphere.castShadow = true;
    sphere.position.set(0, 0.8, 0);
    scene.add(sphere);

    // Object 3: Torus (orbit path)
    const torus = new THREE.Mesh(
      new THREE.TorusGeometry(0.7, 0.28, 16, 64),
      new THREE.MeshStandardMaterial({ color: 0x44ff88, roughness: 0.3, metalness: 0.6 })
    );
    torus.castShadow = true;
    torus.position.set(3, 1, 0);
    scene.add(torus);

    // ── AnimationMixer ────────────────────────────────────────────────────
    const DURATION = 3;
    const mixer = new THREE.AnimationMixer(scene);
    const actions = [];

    // Box: position Y bounce + rotation
    const boxPosTrack = new THREE.VectorKeyframeTrack(
      '.position',
      [0, 0.5, 1, 1.5, 2, 2.5, 3],
      [-3, 0.75, 0,
       -3, 3.5, 0,
       -3, 0.75, 0,
       -3, 2.5, 0,
       -3, 0.75, 0,
       -3, 1.8, 0,
       -3, 0.75, 0]
    );
    const boxRotTrack = new THREE.QuaternionKeyframeTrack(
      '.quaternion',
      [0, 1, 2, 3],
      [
        ...new THREE.Quaternion().toArray(),
        ...new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI).toArray(),
        ...new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI).toArray(),
        ...new THREE.Quaternion().toArray(),
      ]
    );
    const boxClip = new THREE.AnimationClip('box', DURATION, [boxPosTrack, boxRotTrack]);
    const boxAction = mixer.clipAction(boxClip, box);
    boxAction.setLoop(THREE.LoopRepeat, Infinity);
    boxAction.play();
    actions.push(boxAction);

    // Sphere: scale bounce
    const sphScaleTrack = new THREE.VectorKeyframeTrack(
      '.scale',
      [0, 0.3, 0.6, 0.9, 1.2, 1.5, 1.8, 2.1, 2.4, 2.7, 3],
      [1,1,1,  0.95,1.15,0.95,  1,1,1,  0.95,1.15,0.95,
       1,1,1,  0.95,1.15,0.95,  1,1,1,  0.95,1.15,0.95, 1,1,1, 0.95,1.15,0.95, 1,1,1]
    );
    const sphPosTrack = new THREE.VectorKeyframeTrack(
      '.position',
      [0, 0.3, 0.6, 0.9, 1.2, 1.5, 1.8, 2.1, 2.4, 2.7, 3],
      [0,0.8,0, 0,3.5,0, 0,0.8,0, 0,2.5,0,
       0,0.8,0, 0,1.8,0, 0,0.8,0, 0,1.3,0, 0,0.8,0, 0,1,0, 0,0.8,0]
    );
    const sphClip = new THREE.AnimationClip('sphere', DURATION, [sphScaleTrack, sphPosTrack]);
    const sphAction = mixer.clipAction(sphClip, sphere);
    sphAction.setLoop(THREE.LoopRepeat, Infinity);
    sphAction.play();
    actions.push(sphAction);

    // Torus: orbit rotation
    const torPosTrack = new THREE.VectorKeyframeTrack(
      '.position',
      [0, 1, 2, 3],
      [3, 1, 0,  0, 1, 3,  -3, 1, 0,  3, 1, 0]
    );
    const torClip = new THREE.AnimationClip('torus', DURATION, [torPosTrack]);
    const torAction = mixer.clipAction(torClip, torus);
    torAction.setLoop(THREE.LoopRepeat, Infinity);
    torAction.play();
    actions.push(torAction);

    // ── UI ────────────────────────────────────────────────────────────────
    const timelineEl = document.getElementById('timeline');
    const loopMap = { once: THREE.LoopOnce, repeat: THREE.LoopRepeat, pingpong: THREE.LoopPingPong };

    document.getElementById('btnPlay').onclick = () => actions.forEach(a => a.play());
    document.getElementById('btnPause').onclick = () => actions.forEach(a => a.paused = !a.paused);
    document.getElementById('btnStop').onclick = () => actions.forEach(a => { a.stop(); a.reset(); });
    document.getElementById('timeScale').oninput = e => actions.forEach(a => a.setEffectiveTimeScale(parseFloat(e.target.value)));
    document.getElementById('weight').oninput = e => actions.forEach(a => a.setEffectiveWeight(parseFloat(e.target.value)));
    document.getElementById('loop').onchange = e => actions.forEach(a => a.setLoop(loopMap[e.target.value], Infinity));

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const delta = clock.getDelta();
      mixer.update(delta);
      torus.rotation.y += delta * 2;

      const t = actions[0]?.time || 0;
      timelineEl.textContent = `Time: ${t.toFixed(2)}s / ${DURATION.toFixed(2)}s`;

      controls.update();
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
