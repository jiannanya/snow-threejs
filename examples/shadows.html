<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Three.js - Shadows</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px; text-align: center;
    }
    #panel {
      position: fixed; top: 60px; right: 16px;
      background: rgba(0,0,0,0.7); color: #fff; font-size: 12px;
      padding: 12px 16px; border-radius: 6px; min-width: 200px;
    }
    #panel select, #panel input { margin-left: 8px; }
    #panel div { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="info">Three.js Shadows — Shadow Mapping | Drag to Rotate</div>
  <div id="panel">
    <div>Shadow Type:
      <select id="shadowType">
        <option value="basic">BasicShadowMap</option>
        <option value="pcf" selected>PCFShadowMap</option>
        <option value="soft">PCFSoftShadowMap</option>
        <option value="vsm">VSMShadowMap</option>
      </select>
    </div>
    <div>Map Size:
      <select id="mapSize">
        <option value="512">512</option>
        <option value="1024" selected>1024</option>
        <option value="2048">2048</option>
      </select>
    </div>
    <div>Bias: <input id="bias" type="range" min="-0.01" max="0.01" step="0.0001" value="-0.001"></div>
    <div><label><input type="checkbox" id="showHelper"> Show shadow camera</label></div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d1a);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(8, 10, 14);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    // ── Directional Light ────────────────────────────────────────────────────
    const dirLight = new THREE.DirectionalLight(0xffffff, 3);
    dirLight.position.set(8, 15, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -12;
    dirLight.shadow.camera.right = 12;
    dirLight.shadow.camera.top = 12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.bias = -0.001;
    scene.add(dirLight);
    scene.add(new THREE.AmbientLight(0x334466, 0.8));

    const shadowCamHelper = new THREE.CameraHelper(dirLight.shadow.camera);
    shadowCamHelper.visible = false;
    scene.add(shadowCamHelper);

    // ── Scene Objects ────────────────────────────────────────────────────────
    const stdMat = (color, rough = 0.7, metal = 0) =>
      new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal });

    // Floor
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(24, 24, 16, 16),
      stdMat(0x445566, 0.9)
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Walls
    const wall1 = new THREE.Mesh(new THREE.PlaneGeometry(24, 10), stdMat(0x334455));
    wall1.position.set(0, 5, -12);
    wall1.receiveShadow = true;
    scene.add(wall1);

    // Objects that cast and receive shadows
    const shapes = [
      { geo: new THREE.BoxGeometry(2, 2, 2),           pos: [-4, 1, -2], color: 0xff6644 },
      { geo: new THREE.SphereGeometry(1, 32, 32),      pos: [0, 1, -2],  color: 0x44aaff },
      { geo: new THREE.CylinderGeometry(0.5, 0.8, 2, 32), pos: [4, 1, -2], color: 0xaaff44 },
      { geo: new THREE.TorusGeometry(0.8, 0.3, 16, 64), pos: [-4, 1, 3],  color: 0xff44aa },
      { geo: new THREE.ConeGeometry(1, 2.5, 32),       pos: [0, 1.25, 3], color: 0xffaa00 },
      { geo: new THREE.TorusKnotGeometry(0.7, 0.25, 100, 16), pos: [4, 1, 3], color: 0xaa44ff },
    ];

    const meshes = [];
    shapes.forEach(({ geo, pos, color }) => {
      const m = new THREE.Mesh(geo, stdMat(color, 0.5, 0.2));
      m.position.set(...pos);
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
      meshes.push(m);
    });

    // ── UI ───────────────────────────────────────────────────────────────────
    const typeMap = {
      basic: THREE.BasicShadowMap,
      pcf:   THREE.PCFShadowMap,
      soft:  THREE.PCFSoftShadowMap,
      vsm:   THREE.VSMShadowMap,
    };
    document.getElementById('shadowType').onchange = (e) => {
      renderer.shadowMap.type = typeMap[e.target.value];
      renderer.shadowMap.needsUpdate = true;
    };
    document.getElementById('mapSize').onchange = (e) => {
      const s = parseInt(e.target.value);
      dirLight.shadow.mapSize.set(s, s);
      dirLight.shadow.map?.dispose();
      dirLight.shadow.map = null;
    };
    document.getElementById('bias').oninput = (e) => {
      dirLight.shadow.bias = parseFloat(e.target.value);
    };
    document.getElementById('showHelper').onchange = (e) => {
      shadowCamHelper.visible = e.target.checked;
    };

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const t = clock.getElapsedTime();
      meshes.forEach((m, i) => {
        m.rotation.y = t * 0.5 + i;
        m.rotation.x = t * 0.3;
      });
      // Orbit light
      dirLight.position.x = Math.sin(t * 0.3) * 10;
      dirLight.position.z = Math.cos(t * 0.3) * 10;
      shadowCamHelper.update();
      controls.update();
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
