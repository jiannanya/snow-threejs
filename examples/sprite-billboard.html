<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Three.js - Sprite Billboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px;
    }
    #panel {
      position: fixed; top: 60px; right: 16px;
      background: rgba(0,0,0,0.75); color: #fff; font-size: 12px;
      padding: 12px 16px; border-radius: 6px; min-width: 220px; line-height: 2;
    }
    #panel input[type=range] { width: 130px; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="info">Three.js Sprites — Billboard & Label Sprites</div>
  <div id="panel">
    <b>Sprites</b><br>
    <label><input type="checkbox" id="scaleDist" checked> Scale by distance</label><br>
    <label><input type="checkbox" id="anim" checked> Animate</label><br>
    Size:      <input type="range" id="size"    min="0.2" max="3" step="0.1" value="1"><br>
    Opacity:   <input type="range" id="opacity" min="0"   max="1" step="0.05" value="1"><br>
    Sprite Type:
    <select id="type">
      <option value="particle">Particle Glow</option>
      <option value="label" selected>Text Label</option>
      <option value="icon">Icon</option>
      <option value="mixed">Mixed</option>
    </select>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 8, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x334466, 2));
    const dir = new THREE.DirectionalLight(0xffffff, 2);
    dir.position.set(5, 10, 5);
    scene.add(dir);

    // Floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0x0a0a1a, roughness: 0.9 }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    scene.add(new THREE.GridHelper(40, 40, 0x112233, 0x0d1a26));

    // ── Canvas Texture Factories ───────────────────────────────────────────
    function makeGlowTex(color = '#88ccff', size = 128) {
      const c = document.createElement('canvas'); c.width = c.height = size;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      g.addColorStop(0, color); g.addColorStop(0.4, color + '88'); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(c);
    }

    function makeLabelTex(text, bgColor = 'rgba(0,60,120,0.85)', textColor = '#aaddff') {
      const c = document.createElement('canvas'); c.width = 256; c.height = 64;
      const ctx = c.getContext('2d');
      ctx.fillStyle = bgColor;
      ctx.roundRect(2, 2, 252, 60, 12);
      ctx.fill();
      ctx.strokeStyle = '#3388cc';
      ctx.lineWidth = 2;
      ctx.roundRect(2, 2, 252, 60, 12);
      ctx.stroke();
      ctx.fillStyle = textColor;
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, 128, 32);
      return new THREE.CanvasTexture(c);
    }

    function makeIconTex(symbol, color = '#ffcc44') {
      const c = document.createElement('canvas'); c.width = c.height = 128;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 60);
      g.addColorStop(0, color + 'cc'); g.addColorStop(1, color + '00');
      ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
      ctx.font = '72px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(symbol, 64, 64);
      return new THREE.CanvasTexture(c);
    }

    // ── Reference 3D objects (planets) ────────────────────────────────────
    const planetData = [
      { name: '☀ Sun',     pos: [0, 2, 0],       r: 1.5, color: 0xffaa00, emit: 0xff6600 },
      { name: '🌎 Earth',  pos: [5, 1, 0],       r: 0.6, color: 0x2266aa, emit: 0x001133 },
      { name: '🔴 Mars',   pos: [-4, 1, 3],      r: 0.5, color: 0xaa4422, emit: 0x330000 },
      { name: '🪐 Saturn', pos: [0, 1.5, -6],    r: 0.9, color: 0xddbb88, emit: 0x332200 },
      { name: '⚡ Station', pos: [3, 4, -3],     r: 0.3, color: 0x88aacc, emit: 0x112233 },
    ];

    const planets = [];
    planetData.forEach(pd => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(pd.r, 32, 32),
        new THREE.MeshStandardMaterial({ color: pd.color, emissive: pd.emit, roughness: 0.5, metalness: 0.3 })
      );
      mesh.position.set(...pd.pos);
      scene.add(mesh);
      planets.push({ mesh, ...pd });
    });

    // ── Sprites ────────────────────────────────────────────────────────────
    const spriteObjects = [];
    let currentType = 'label';

    function clearSprites() {
      spriteObjects.forEach(s => { s.parent?.remove(s); s.material.map?.dispose(); s.material.dispose(); });
      spriteObjects.length = 0;
    }

    function buildSprites(type) {
      clearSprites();
      planets.forEach(({ mesh, name, pos }) => {
        let tex, scale;
        if (type === 'particle' || type === 'mixed') {
          tex = makeGlowTex(new THREE.Color().setHSL(Math.random(), 1, 0.7).getStyle());
          scale = new THREE.Vector3(2, 2, 1);
        } else if (type === 'label') {
          tex = makeLabelTex(name);
          scale = new THREE.Vector3(2.5, 0.6, 1);
        } else {
          tex = makeIconTex(name.split(' ')[0]);
          scale = new THREE.Vector3(1.2, 1.2, 1);
        }

        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
          map: tex, transparent: true, depthWrite: false, sizeAttenuation: true,
        }));
        sprite.scale.copy(scale);
        sprite.position.set(pos[0], pos[1] + 1.5 + (mesh.geometry.parameters.radius || 0.5), pos[2]);
        scene.add(sprite);
        spriteObjects.push(sprite);
      });

      // Extra particle sprites
      if (type === 'particle' || type === 'mixed') {
        for (let i = 0; i < 40; i++) {
          const tex = makeGlowTex(new THREE.Color().setHSL(Math.random(), 1, 0.6).getStyle(), 64);
          const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
          const r = 8 + Math.random() * 6;
          const angle = Math.random() * Math.PI * 2;
          s.position.set(Math.cos(angle) * r, 1 + Math.random() * 5, Math.sin(angle) * r);
          const sz = 0.2 + Math.random() * 0.6;
          s.scale.set(sz, sz, 1);
          s.userData.phase = Math.random() * Math.PI * 2;
          scene.add(s);
          spriteObjects.push(s);
        }
      }
    }

    buildSprites(currentType);

    // ── UI ────────────────────────────────────────────────────────────────
    document.getElementById('type').onchange = (e) => {
      currentType = e.target.value; buildSprites(currentType);
    };
    document.getElementById('size').oninput = (e) => {
      spriteObjects.forEach(s => s.scale.multiplyScalar(parseFloat(e.target.value) / (s.userData.prevScale || 1)));
      spriteObjects.forEach(s => s.userData.prevScale = parseFloat(e.target.value));
    };
    document.getElementById('opacity').oninput = (e) => {
      spriteObjects.forEach(s => s.material.opacity = parseFloat(e.target.value));
    };

    let doAnim = true, doScaleDist = true;
    document.getElementById('anim').onchange = e => doAnim = e.target.checked;
    document.getElementById('scaleDist').onchange = e => doScaleDist = e.target.checked;

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const t = clock.getElapsedTime();
      // Orbit earth
      planets[1].mesh.position.x = Math.cos(t * 0.5) * 5;
      planets[1].mesh.position.z = Math.sin(t * 0.5) * 5;

      if (doAnim) {
        spriteObjects.forEach((s, i) => {
          if (s.userData.phase !== undefined) {
            s.material.opacity = 0.5 + 0.5 * Math.sin(t * 2 + s.userData.phase);
          }
        });
        // Sync label sprites to planet positions
        planets.forEach(({ mesh }, i) => {
          if (spriteObjects[i]) {
            spriteObjects[i].position.x = mesh.position.x;
            spriteObjects[i].position.z = mesh.position.z;
          }
        });
      }

      if (doScaleDist) {
        spriteObjects.forEach(s => {
          const dist = camera.position.distanceTo(s.position);
          const sc = Math.max(0.3, Math.min(3, dist * 0.15));
          s.scale.setScalar(sc);
        });
      }

      controls.update();
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
