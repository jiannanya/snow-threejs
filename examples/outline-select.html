<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three.js — Outline Select</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a14; overflow: hidden; font-family: monospace; }
#info { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  color: #ccc; font-size: 13px; background: rgba(0,0,0,.65); padding: 6px 16px; border-radius: 6px; white-space: nowrap; }
#tooltip { position: absolute; display: none; background: rgba(0,20,60,.9); color: #88ccff;
  font-size: 12px; padding: 6px 10px; border-radius: 4px; border: 1px solid #4488ff; pointer-events: none; }
#controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; align-items: center; }
label { color: #aaa; font-size: 12px; }
input[type=range] { width: 100px; }
</style>
</head>
<body>
<div id="info">Three.js OutlinePass — Click to Select · Hover Highlight · Selection Glow</div>
<div id="tooltip"></div>
<div id="controls">
  <label>Outline Strength <input type="range" id="strength" min="1" max="10" step="0.5" value="3"></label>
  <label>Glow Thickness <input type="range" id="thick" min="1" max="6" step="0.5" value="2"></label>
</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { OutlinePass }     from 'three/addons/postprocessing/OutlinePass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);
const camera   = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 5, 16);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0x334466, 1));
const dLight = new THREE.DirectionalLight(0xffffff, 2);
dLight.position.set(5, 10, 8);
scene.add(dLight);
scene.add(new THREE.GridHelper(30, 30, 0x222244, 0x111133));

// Objects
const objs = [
  { geo: new THREE.BoxGeometry(2, 2, 2),          pos: [-5, 1, 0], color: 0xff4444, name: 'Red Cube' },
  { geo: new THREE.SphereGeometry(1.2, 32, 32),   pos: [ 0, 1.2, 0], color: 0x44ff88, name: 'Green Sphere' },
  { geo: new THREE.TorusKnotGeometry(0.9, 0.25, 80, 12), pos: [ 5, 1.2, 0], color: 0x4488ff, name: 'Blue TorusKnot' },
  { geo: new THREE.ConeGeometry(1, 2.5, 24),       pos: [-5, 1.25, -5], color: 0xffcc44, name: 'Yellow Cone' },
  { geo: new THREE.CylinderGeometry(0.8, 0.8, 2.5, 24), pos: [0, 1.25, -5], color: 0xff44cc, name: 'Pink Cylinder' },
  { geo: new THREE.IcosahedronGeometry(1.2, 1),    pos: [ 5, 1.2, -5], color: 0x44ccff, name: 'Cyan Icosahedron' },
];

const meshes = objs.map(({ geo, pos, color, name }) => {
  const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.3 }));
  m.position.set(...pos);
  m.userData.name = name;
  scene.add(m);
  return m;
});

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const outlinePass = new OutlinePass(new THREE.Vector2(innerWidth, innerHeight), scene, camera);
outlinePass.edgeStrength = 3;
outlinePass.edgeThickness = 2;
outlinePass.edgeGlow = 0.5;
outlinePass.visibleEdgeColor.set(0x00aaff);
outlinePass.hiddenEdgeColor.set(0x004466);
composer.addPass(outlinePass);
composer.addPass(new OutputPass());

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedObjects = [];
let hoveredObject = null;
const tooltip = document.getElementById('tooltip');

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length > 0) {
    hoveredObject = hits[0].object;
    renderer.domElement.style.cursor = 'pointer';
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top  = (e.clientY - 28) + 'px';
    tooltip.textContent = hoveredObject.userData.name;
  } else {
    hoveredObject = null;
    renderer.domElement.style.cursor = 'default';
    tooltip.style.display = 'none';
  }
  // Hover outline (yellow) if not selected
  const hovered = hoveredObject && !selectedObjects.includes(hoveredObject) ? [hoveredObject] : [];
  if (hoveredObject && !selectedObjects.includes(hoveredObject)) {
    outlinePass.visibleEdgeColor.set(0xffcc00);
    outlinePass.selectedObjects = [...selectedObjects, hoveredObject];
  } else {
    outlinePass.visibleEdgeColor.set(0x00aaff);
    outlinePass.selectedObjects = selectedObjects;
  }
});

window.addEventListener('click', e => {
  if (hoveredObject) {
    const idx = selectedObjects.indexOf(hoveredObject);
    if (idx === -1) selectedObjects.push(hoveredObject);
    else selectedObjects.splice(idx, 1);
    outlinePass.selectedObjects = selectedObjects;
  }
});

document.getElementById('strength').addEventListener('input', e => { outlinePass.edgeStrength = +e.target.value; });
document.getElementById('thick').addEventListener('input', e => { outlinePass.edgeThickness = +e.target.value; });

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  outlinePass.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  meshes.forEach((m, i) => { m.rotation.y += 0.005 * (1 + i * 0.1); });
  controls.update();
  composer.render();
});
</script>
</body>
</html>
