<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three.js — Depth of Field</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050510; overflow: hidden; font-family: monospace; }
#info { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  color: #ccc; font-size: 13px; background: rgba(0,0,0,.65); padding: 6px 16px; border-radius: 6px; white-space: nowrap; }
#controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; }
button { background: rgba(255,255,255,.1); color: #fff; border: 1px solid #555;
  padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
button.active { background: rgba(80,200,255,.3); border-color: #50c8ff; }
label { color: #aaa; font-size: 12px; }
input[type=range] { width: 100px; }
</style>
</head>
<body>
<div id="info">Three.js Depth of Field — BokehPass · EffectComposer · Focus Distance · Aperture</div>
<div id="controls">
  <button id="btnDOF" class="active">DOF On</button>
  <label>Focus <input type="range" id="focus" min="1" max="30" step="0.5" value="10"></label>
  <label>Aperture <input type="range" id="aperture" min="0.00001" max="0.001" step="0.00001" value="0.00015"></label>
  <label>Max Blur <input type="range" id="maxblur" min="0.001" max="0.02" step="0.001" value="0.006"></label>
</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { BokehPass }      from 'three/addons/postprocessing/BokehPass.js';

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
const camera   = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 5, 22);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
scene.add(new THREE.AmbientLight(0x334466, 1));
const dLight = new THREE.DirectionalLight(0xffffff, 2);
dLight.position.set(10, 15, 10);
scene.add(dLight);

// Ground
scene.add(new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9 })
).rotateX(-Math.PI/2));

// Many objects at different depths
const geometries = [
  new THREE.SphereGeometry(0.6, 20, 20),
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.TorusGeometry(0.5, 0.2, 12, 24),
  new THREE.ConeGeometry(0.5, 1.2, 8),
  new THREE.OctahedronGeometry(0.7),
];
const objects = [];
for (let i = 0; i < 60; i++) {
  const geo = geometries[i % geometries.length];
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(i/60, 0.9, 0.5),
    roughness: 0.4, metalness: 0.4,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(
    (Math.random() - 0.5) * 30,
    0.6 + Math.random() * 2,
    (Math.random() - 0.5) * 40
  );
  m.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
  scene.add(m);
  objects.push(m);
}

// EffectComposer with BokehPass
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bokehPass = new BokehPass(scene, camera, {
  focus: 10, aperture: 0.00015, maxblur: 0.006,
});
composer.addPass(bokehPass);

let dofEnabled = true;
document.getElementById('btnDOF').addEventListener('click', e => {
  dofEnabled = !dofEnabled;
  bokehPass.enabled = dofEnabled;
  e.currentTarget.classList.toggle('active', dofEnabled);
});
document.getElementById('focus')   .addEventListener('input', e => { bokehPass.uniforms.focus.value = +e.target.value; });
document.getElementById('aperture').addEventListener('input', e => { bokehPass.uniforms.aperture.value = +e.target.value; });
document.getElementById('maxblur') .addEventListener('input', e => { bokehPass.uniforms.maxblur.value = +e.target.value; });

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();
  objects.forEach((m, i) => {
    m.rotation.y += 0.01;
    m.position.y = 0.6 + Math.sin(t + i * 0.5) * 0.5;
  });
  controls.update();
  composer.render();
});
</script>
</body>
</html>
