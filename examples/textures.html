<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Three.js - Textures</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="info">Three.js Textures — 程序纹理 + UV映射 | 拖拽旋转</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 5, 14);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x445566, 1));
    const dir = new THREE.DirectionalLight(0xffffff, 3);
    dir.position.set(5, 10, 5);
    scene.add(dir);

    // ── Procedural Texture Generators ─────────────────────────────────────
    function makeCanvasTexture(size, fn) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      fn(ctx, size);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // Checkerboard
    const checker = makeCanvasTexture(256, (ctx, s) => {
      const tile = s / 8;
      for (let y = 0; y < 8; y++) for (let x = 0; x < 8; x++) {
        ctx.fillStyle = (x + y) % 2 === 0 ? '#ffffff' : '#222244';
        ctx.fillRect(x * tile, y * tile, tile, tile);
      }
    });

    // Gradient circles
    const circles = makeCanvasTexture(256, (ctx, s) => {
      ctx.fillStyle = '#001122';
      ctx.fillRect(0, 0, s, s);
      for (let i = 5; i >= 0; i--) {
        const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s * i / 10);
        g.addColorStop(0, `hsl(${i * 50}, 90%, 60%)`);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(s/2, s/2, s * i / 10, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    // Grid pattern
    const grid = makeCanvasTexture(256, (ctx, s) => {
      ctx.fillStyle = '#001133';
      ctx.fillRect(0, 0, s, s);
      ctx.strokeStyle = '#00aaff';
      ctx.lineWidth = 1.5;
      const cells = 8;
      for (let i = 0; i <= cells; i++) {
        const pos = (i / cells) * s;
        ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(s, pos); ctx.stroke();
      }
    });

    // Noise-like pattern
    const noise = makeCanvasTexture(256, (ctx, s) => {
      const data = ctx.createImageData(s, s);
      for (let i = 0; i < data.data.length; i += 4) {
        const v = Math.floor(Math.random() * 255);
        data.data[i] = v * 0.2;
        data.data[i+1] = v * 0.5;
        data.data[i+2] = v;
        data.data[i+3] = 255;
      }
      ctx.putImageData(data, 0, 0);
    });

    // Stripes
    const stripes = makeCanvasTexture(256, (ctx, s) => {
      const count = 16;
      for (let i = 0; i < count; i++) {
        ctx.fillStyle = `hsl(${i * 360 / count}, 80%, 55%)`;
        ctx.fillRect(0, i * (s / count), s, s / count);
      }
    });

    // UV checker (numbered)
    const uvCheck = makeCanvasTexture(256, (ctx, s) => {
      for (let y = 0; y < 4; y++) for (let x = 0; x < 4; x++) {
        ctx.fillStyle = `hsl(${(x + y * 4) * 22}, 70%, 50%)`;
        const tx = x * (s/4), ty = y * (s/4), ts = s/4;
        ctx.fillRect(tx, ty, ts, ts);
        ctx.fillStyle = '#fff';
        ctx.font = `${ts * 0.3}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${x},${y}`, tx + ts/2, ty + ts/2);
      }
    });

    const textures = [checker, circles, grid, noise, stripes, uvCheck];
    const geos = [
      new THREE.BoxGeometry(2, 2, 2),
      new THREE.SphereGeometry(1.1, 64, 32),
      new THREE.CylinderGeometry(0.7, 0.9, 2, 32),
      new THREE.TorusGeometry(0.8, 0.35, 16, 64),
      new THREE.ConeGeometry(1, 2, 32),
      new THREE.TorusKnotGeometry(0.6, 0.22, 100, 16),
    ];

    const meshes = [];
    textures.forEach((tex, i) => {
      const geo = geos[i];
      // Apply repeat for checker / grid
      if (i === 0 || i === 2) { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(2, 2); }
      const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.5, metalness: 0.1 });
      const mesh = new THREE.Mesh(geo, mat);
      const col = i % 3, row = Math.floor(i / 3);
      mesh.position.set((col - 1) * 4, -row * 4 + 2, 0);
      mesh.castShadow = true;
      scene.add(mesh);
      meshes.push(mesh);
    });

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const t = clock.getElapsedTime();
      meshes.forEach((m, i) => { m.rotation.y = t * 0.4 + i; m.rotation.x = t * 0.2; });
      controls.update();
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
