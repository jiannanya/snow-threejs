<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three.js — Shader Extend</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080810; overflow: hidden; font-family: monospace; }
#info { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  color: #ccc; font-size: 13px; background: rgba(0,0,0,.65); padding: 6px 16px; border-radius: 6px; white-space: nowrap; }
#controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
button { background: rgba(255,255,255,.1); color: #fff; border: 1px solid #555;
  padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
button.active { background: rgba(80,200,255,.3); border-color: #50c8ff; }
</style>
</head>
<body>
<div id="info">Three.js Shader Extend — onBeforeCompile · GLSL Injection · MeshStandardMaterial</div>
<div id="controls">
  <button id="btnRipple" class="active">Ripple UV</button>
  <button id="btnNoise">Noise Dissolve</button>
  <button id="btnRainbow">Rainbow Tint</button>
  <button id="btnGlitch">Glitch</button>
  <button id="btnXray">X-Ray</button>
</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x080810);
const camera   = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 2, 8);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0x334466, 1));
const dLight = new THREE.DirectionalLight(0xffffff, 2);
dLight.position.set(5, 8, 5);
scene.add(dLight);
const pLight = new THREE.PointLight(0x8844ff, 30, 20);
pLight.position.set(-4, 3, 4);
scene.add(pLight);

// Shared time uniform
const timeUniforms = { uTime: { value: 0 } };

function buildMaterial(mode) {
  const mat = new THREE.MeshStandardMaterial({
    color: 0x4488cc, roughness: 0.4, metalness: 0.3,
  });
  mat.userData.mode = mode;
  mat.transparent = mode === 'xray';
  mat.depthWrite = mode !== 'xray';
  mat.side = mode === 'xray' ? THREE.DoubleSide : THREE.FrontSide;

  mat.onBeforeCompile = (shader) => {
    shader.uniforms.uTime = timeUniforms.uTime;

    const vertexHeader = `#include <common>
      uniform float uTime;
      varying vec3 vFxPos;
      varying vec3 vFxNormal;`;
    const vertexBody = mode === 'ripple'
      ? `#include <begin_vertex>
         float fxWave = sin(position.y * 4.0 + uTime * 2.0) * 0.15;
         transformed += normal * fxWave;
         vFxPos = transformed;
         vFxNormal = normalize(normalMatrix * normal);`
      : `#include <begin_vertex>
         vFxPos = transformed;
         vFxNormal = normalize(normalMatrix * normal);`;

    shader.vertexShader = shader.vertexShader
      .replace('#include <common>', vertexHeader)
      .replace('#include <begin_vertex>', vertexBody);

    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <common>',
      `#include <common>
       uniform float uTime;
       varying vec3 vFxPos;
       varying vec3 vFxNormal;
       float fxHash(vec2 p) {
         return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
       }
       float fxNoise(vec2 p) {
         vec2 i = floor(p);
         vec2 f = fract(p);
         f = f * f * (3.0 - 2.0 * f);
         return mix(
           mix(fxHash(i), fxHash(i + vec2(1.0, 0.0)), f.x),
           mix(fxHash(i + vec2(0.0, 1.0)), fxHash(i + vec2(1.0, 1.0)), f.x),
           f.y
         );
       }`
    );

    if (mode === 'noise') {
      shader.fragmentShader = shader.fragmentShader.replace(
        'gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
        `float n = fxNoise(vFxPos.xy * 2.2 + uTime * 0.5);
         if (n < 0.35 + sin(uTime) * 0.2) discard;
         gl_FragColor = vec4( outgoingLight, diffuseColor.a );`
      );
    } else if (mode === 'rainbow') {
      shader.fragmentShader = shader.fragmentShader.replace(
        'gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
        `vec3 rainbow = vec3(
           sin(uTime + vFxPos.y * 2.5) * 0.5 + 0.5,
           sin(uTime + vFxPos.y * 2.5 + 2.094) * 0.5 + 0.5,
           sin(uTime + vFxPos.y * 2.5 + 4.188) * 0.5 + 0.5
         );
         gl_FragColor = vec4( outgoingLight * mix(vec3(1.0), rainbow, 0.85), diffuseColor.a );`
      );
    } else if (mode === 'glitch') {
      shader.fragmentShader = shader.fragmentShader.replace(
        'gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
        `float band = floor((vFxPos.y + 2.0) * 6.0);
         float glitch = step(0.82, fxHash(vec2(band, floor(uTime * 12.0))));
         vec3 glitchTint = mix(vec3(1.0), vec3(1.8, 0.7, 1.3), glitch);
         gl_FragColor = vec4( outgoingLight * glitchTint, diffuseColor.a );`
      );
    } else if (mode === 'xray') {
      shader.fragmentShader = shader.fragmentShader.replace(
        'gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
        `float rim = 1.0 - abs(normalize(vFxNormal).z);
         rim = pow(max(rim, 0.0), 2.5);
         vec3 xrayColor = vec3(0.2, 0.8, 1.0) * (0.3 + rim);
         gl_FragColor = vec4( xrayColor, rim * 0.9 );`
      );
    }
    mat.userData.shader = shader;
  };
  return mat;
}

const geo = new THREE.SphereGeometry(2, 64, 64);
let mesh = null;
let currentMode = 'ripple';

function applyMode(mode) {
  currentMode = mode;
  if (mesh) { scene.remove(mesh); mesh.material.dispose(); }
  const mat = buildMaterial(mode);
  mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  ['btnRipple','btnNoise','btnRainbow','btnGlitch','btnXray'].forEach(id => {
    const m = id.replace('btn','').toLowerCase();
    document.getElementById(id).classList.toggle('active', m === mode);
  });
}

document.getElementById('btnRipple') .addEventListener('click', () => applyMode('ripple'));
document.getElementById('btnNoise')  .addEventListener('click', () => applyMode('noise'));
document.getElementById('btnRainbow').addEventListener('click', () => applyMode('rainbow'));
document.getElementById('btnGlitch') .addEventListener('click', () => applyMode('glitch'));
document.getElementById('btnXray')   .addEventListener('click', () => applyMode('xray'));

applyMode('ripple');

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const t = clock.getElapsedTime();
  timeUniforms.uTime.value = t;
  if (mesh) mesh.rotation.y += 0.005;
  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
