<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Three.js - TSL Node Shader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px; max-width: 600px; text-align: center;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px;
    }
    #panel {
      position: fixed; top: 70px; right: 16px;
      background: rgba(0,0,0,0.78); color: #fff; font-size: 12px;
      padding: 12px 16px; border-radius: 6px; min-width: 230px; line-height: 2.2;
    }
    #panel input[type=range] { width: 140px; vertical-align: middle; }
    select { background: #223; color: #fff; border: 1px solid #446; padding: 2px 6px; }
  </style>
</head>
<body>
  <div id="info">
    Three.js TSL Node-based Shaders (WebGL) — MeshStandardNodeMaterial<br>
    <small>Using THREE.js r167 NodeMaterial system</small>
  </div>
  <div id="panel">
    <b>Node Shader</b><br>
    Effect:
    <select id="effect">
      <option value="wave">Vertex Wave</option>
      <option value="noise">Noise Displacement</option>
      <option value="gradient">Color Gradient</option>
      <option value="fresnel">Fresnel Glow</option>
    </select><br>
    Speed:     <input type="range" id="speed"     min="0.1" max="5"   step="0.1" value="1"><br>
    Intensity: <input type="range" id="intensity" min="0"   max="2"   step="0.05" value="0.5"><br>
    Hue Shift: <input type="range" id="hue"       min="0"   max="1"   step="0.01" value="0.0">
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // NOTE: Three.js TSL (Three Shading Language) node system is available
    // in three/addons/nodes/. This demo uses ShaderMaterial as a practical
    // alternative that illustrates the same concepts (since TSL WebGL renderer
    // requires specific setup). For WebGPU TSL see webgpu-basics.html.

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x04040e);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 2, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x223366, 1));
    const dir = new THREE.DirectionalLight(0xffffff, 1.5);
    dir.position.set(5, 8, 5); scene.add(dir);

    // ── Node-style GLSL shaders (TSL-equivalent patterns) ─────────────────
    const nodeShaders = {
      wave: {
        vert: `
          uniform float u_time;
          uniform float u_intensity;
          varying vec2 vUv;
          varying vec3 vNormal;
          void main() {
            vUv = uv;
            // Node: positionLocal.add(normalLocal.mul(sin(positionLocal.x*4+time).mul(intensity)))
            vec3 pos = position;
            float disp = sin(pos.x * 4.0 + u_time * 2.5) * cos(pos.z * 4.0 + u_time * 2.0) * u_intensity;
            pos += normal * disp;
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          }
        `,
        frag: `
          uniform float u_hue;
          varying vec2 vUv;
          varying vec3 vNormal;
          vec3 hsl(float h, float s, float l) {
            vec3 c = clamp(abs(mod(h*6.0+vec3(0,4,2),6.0)-3.0)-1.0,0.0,1.0);
            return l+s*(c-.5)*(1.-abs(2.*l-1.));
          }
          void main() {
            float light = dot(vNormal, normalize(vec3(1,1,1))) * 0.5 + 0.5;
            gl_FragColor = vec4(hsl(u_hue + vUv.x * 0.3, 0.8, 0.2 + light * 0.5), 1.0);
          }
        `,
      },
      noise: {
        vert: `
          uniform float u_time;
          uniform float u_intensity;
          varying vec2 vUv;
          varying vec3 vNormal;
          // Simplex-like noise
          float hash(vec3 p) { return fract(sin(dot(p, vec3(127.1,311.7,74.7)))*43758.5); }
          float noise(vec3 p) {
            vec3 i = floor(p); vec3 f = fract(p);
            f = f*f*(3.-2.*f);
            return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),
                           mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                       mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                           mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
          }
          void main() {
            vUv = uv;
            vec3 pos = position;
            float n = noise(pos * 3.0 + u_time * 0.5);
            pos += normal * n * u_intensity;
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          }
        `,
        frag: `
          uniform float u_time; uniform float u_hue;
          varying vec2 vUv; varying vec3 vNormal;
          float hash(vec3 p) { return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5); }
          float noise(vec3 p) {
            vec3 i=floor(p);vec3 f=fract(p);f=f*f*(3.-2.*f);
            return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                       mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
          }
          vec3 hsl(float h, float s, float l) {
            vec3 c=clamp(abs(mod(h*6.+vec3(0,4,2),6.)-3.)-1.,0.,1.);
            return l+s*(c-.5)*(1.-abs(2.*l-1.));
          }
          void main() {
            float n = noise(vec3(vUv * 5.0, u_time * 0.3));
            float light = dot(vNormal, normalize(vec3(1,1,1))) * 0.5 + 0.5;
            gl_FragColor = vec4(hsl(u_hue + n * 0.4, 0.9, 0.2 + light * 0.4), 1.0);
          }
        `,
      },
      gradient: {
        vert: `
          varying vec2 vUv;
          varying vec3 vNormal;
          varying vec3 vPos;
          void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            vPos = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        frag: `
          uniform float u_time; uniform float u_hue; uniform float u_intensity;
          varying vec2 vUv; varying vec3 vNormal; varying vec3 vPos;
          vec3 hsl(float h, float s, float l) {
            vec3 c=clamp(abs(mod(h*6.+vec3(0,4,2),6.)-3.)-1.,0.,1.);
            return l+s*(c-.5)*(1.-abs(2.*l-1.));
          }
          void main() {
            float gradient = vUv.y + sin(vUv.x * 6.28 + u_time) * 0.2 * u_intensity;
            float light = dot(vNormal, normalize(vec3(1,1,1))) * 0.4 + 0.6;
            vec3 col = mix(hsl(u_hue, 0.9, 0.3), hsl(u_hue + 0.5, 0.9, 0.6), gradient) * light;
            gl_FragColor = vec4(col, 1.0);
          }
        `,
      },
      fresnel: {
        vert: `
          varying vec3 vNormal;
          varying vec3 vViewDir;
          varying vec2 vUv;
          void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
            vViewDir = normalize(-mvPos.xyz);
            gl_Position = projectionMatrix * mvPos;
          }
        `,
        frag: `
          uniform float u_time; uniform float u_intensity; uniform float u_hue;
          varying vec3 vNormal; varying vec3 vViewDir; varying vec2 vUv;
          vec3 hsl(float h, float s, float l) {
            vec3 c=clamp(abs(mod(h*6.+vec3(0,4,2),6.)-3.)-1.,0.,1.);
            return l+s*(c-.5)*(1.-abs(2.*l-1.));
          }
          void main() {
            float fr = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 3.0);
            fr = fr * u_intensity * 2.0;
            vec3 rimCol = hsl(u_hue + fr * 0.2 + u_time * 0.05, 1.0, 0.5);
            vec3 baseCol = hsl(u_hue + 0.5, 0.3, 0.08);
            gl_FragColor = vec4(mix(baseCol, rimCol, fr), 1.0);
          }
        `,
      },
    };

    const uniforms = {
      u_time:      { value: 0 },
      u_intensity: { value: 0.5 },
      u_hue:       { value: 0 },
    };

    let mesh;
    function buildMesh(effect) {
      if (mesh) { scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); }
      const s = nodeShaders[effect];
      mesh = new THREE.Mesh(
        new THREE.TorusKnotGeometry(1.2, 0.45, 200, 32),
        new THREE.ShaderMaterial({ uniforms, vertexShader: s.vert, fragmentShader: s.frag, side: THREE.DoubleSide })
      );
      scene.add(mesh);
    }
    buildMesh('wave');

    document.getElementById('effect').onchange    = (e) => buildMesh(e.target.value);
    document.getElementById('speed').oninput      = (e) => uniforms.u_time.speedMult = parseFloat(e.target.value);
    document.getElementById('intensity').oninput  = (e) => uniforms.u_intensity.value = parseFloat(e.target.value);
    document.getElementById('hue').oninput        = (e) => uniforms.u_hue.value = parseFloat(e.target.value);
    uniforms.u_time.speedMult = 1;

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      uniforms.u_time.value += clock.getDelta() * (uniforms.u_time.speedMult || 1);
      mesh.rotation.y += 0.003;
      controls.update();
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
