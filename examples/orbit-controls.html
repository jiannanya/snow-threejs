<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Three.js - Orbit Controls</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #info {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px; text-align: center;
    }
    #panel {
      position: fixed; top: 60px; right: 16px;
      background: rgba(0,0,0,0.7); color: #fff; font-size: 12px;
      padding: 12px 16px; border-radius: 6px; min-width: 200px; line-height: 1.8;
    }
    #panel label { cursor: pointer; }
    #panel input[type=range] { width: 120px; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="info">Three.js OrbitControls — 鼠标左键旋转 | 右键平移 | 滚轮缩放</div>
  <div id="panel">
    <b>Controls Settings</b><br>
    <label><input type="checkbox" id="damping" checked> enableDamping</label><br>
    <label><input type="checkbox" id="autoRotate"> autoRotate</label><br>
    <label><input type="checkbox" id="panEnabled" checked> enablePan</label><br>
    <label><input type="checkbox" id="zoomEnabled" checked> enableZoom</label><br>
    <div>Auto Speed: <input type="range" id="autoSpeed" min="0.1" max="5" step="0.1" value="1"></div>
    <div>Damp Factor: <input type="range" id="dampFactor" min="0.01" max="0.3" step="0.01" value="0.05"></div>
    <div>Min Distance: <input type="range" id="minDist" min="1" max="10" step="0.5" value="2"></div>
    <div>Max Distance: <input type="range" id="maxDist" min="20" max="100" step="5" value="50"></div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080818);
    scene.fog = new THREE.FogExp2(0x080818, 0.03);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
    camera.position.set(15, 10, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 2;
    controls.maxDistance = 50;
    controls.maxPolarAngle = Math.PI / 2 + 0.2;

    // Lights
    scene.add(new THREE.AmbientLight(0x334466, 1));
    const dir = new THREE.DirectionalLight(0xffffff, 2);
    dir.position.set(10, 20, 10);
    dir.castShadow = true;
    scene.add(dir);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100, 50, 50),
      new THREE.MeshStandardMaterial({ color: 0x112233, roughness: 1, wireframe: false })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    scene.add(new THREE.GridHelper(100, 50, 0x334455, 0x223344));

    // Populate scene with objects
    const rng = (min, max) => min + Math.random() * (max - min);
    for (let i = 0; i < 60; i++) {
      const geos = [
        new THREE.BoxGeometry(rng(0.5, 2), rng(1, 4), rng(0.5, 2)),
        new THREE.SphereGeometry(rng(0.3, 1), 16, 16),
        new THREE.CylinderGeometry(rng(0.2, 0.8), rng(0.3, 1), rng(1, 3), 16),
      ];
      const geo = geos[Math.floor(Math.random() * 3)];
      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5),
        roughness: Math.random() * 0.8 + 0.1,
        metalness: Math.random() * 0.6,
      });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(rng(-25, 25), 0, rng(-25, 25));
      m.position.y = geo.parameters.height ? geo.parameters.height / 2 : 0.5;
      m.rotation.y = rng(0, Math.PI * 2);
      m.castShadow = true;
      m.receiveShadow = true;
      scene.add(m);
    }

    // Central landmark
    const landmark = new THREE.Mesh(
      new THREE.TorusKnotGeometry(2, 0.6, 100, 16),
      new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.2, metalness: 0.8, emissive: 0x441100 })
    );
    landmark.position.y = 4;
    landmark.castShadow = true;
    scene.add(landmark);

    // Axes at origin
    scene.add(new THREE.AxesHelper(5));

    // Panel controls
    const c = controls;
    document.getElementById('damping').onchange = e => c.enableDamping = e.target.checked;
    document.getElementById('autoRotate').onchange = e => c.autoRotate = e.target.checked;
    document.getElementById('panEnabled').onchange = e => c.enablePan = e.target.checked;
    document.getElementById('zoomEnabled').onchange = e => c.enableZoom = e.target.checked;
    document.getElementById('autoSpeed').oninput = e => c.autoRotateSpeed = parseFloat(e.target.value);
    document.getElementById('dampFactor').oninput = e => c.dampingFactor = parseFloat(e.target.value);
    document.getElementById('minDist').oninput = e => c.minDistance = parseFloat(e.target.value);
    document.getElementById('maxDist').oninput = e => c.maxDistance = parseFloat(e.target.value);

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const t = clock.getElapsedTime();
      landmark.rotation.y = t * 0.3;
      landmark.rotation.x = t * 0.2;
      controls.update();
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
